<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pop operation simulator</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Outfit', sans-serif;
        background: #f2f1e8;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    .title {
        text-align: center;
        font-size: 36px;
        font-weight: 600;
        margin: 10px 0;
    }

    .instructions {
        text-align: center;
        font-size: 22px;
        margin-bottom: 10px;
    }

    .main {
        display: flex;
        flex: 1;
        gap: 15px;
        padding: 10px;
    }

    .code-container {
        flex: 1;
        background: #2f2a44;
        color: #f9f9fa;
        padding: 15px;
        border-radius: 12px;
        font-size: 20px;
        overflow-y: auto;
    }

    .stack-container {
        flex: 1;
        background: #724b9e;
        padding: 15px;
        border-radius: 12px;
        display: flex;
        flex-direction: column-reverse;
        align-items: center;
    }

    .stack-block {
        background: #77a766;
        color: #f2f1e8;
        padding: 15px;
        margin: 8px;
        width: 60%;
        text-align: center;
        border-radius: 8px;
        font-size: 20px;
    }

    /* Output label */
    .output-label {
        text-align: center;
        font-size: 20px;
        font-weight: 600;
        color: #2f2a44;
        margin-top: 5px;
    }

    /* Output container */
    .output-container {
        background: #f9f9fa;
        color: #000;
        margin: 10px;
        padding: 15px;
        border-radius: 10px;
        font-size: 20px;
        text-align: center;
        min-height: 40px;
    }

    .buttons {
        text-align: center;
        margin: 10px 0;
    }

    button {
        padding: 12px 25px;
        margin: 5px;
        font-size: 18px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: 'Outfit', sans-serif;
    }

    .pop {
        background: #77a766;
        color: #f2f1e8;
    }

    .reset {
        background: #724b9e;
        color: #f9f9fa;
    }

    .footer {
        text-align: center;
        font-size: 16px;
        padding: 5px;
    }

</style>
</head>

<body>

<div class="title">Pop operation simulator</div>

<div class="instructions">
    Click POP → item = stack.pop() → print(item) → Observe stack (LIFO)
</div>

<div class="main">

    <!-- Code -->
    <div class="code-container" id="codeBox">
        stack = [10, 20, 30, 40, 50]
    </div>

    <!-- Stack -->
    <div class="stack-container" id="stackBox"></div>

</div>

<!-- Output label -->
<div class="output-label">Output</div>

<!-- Output box -->
<div class="output-container" id="outputBox">
    Output will appear here
</div>

<div class="buttons">
    <button class="pop" onclick="popValue()">Pop</button>
    <button class="reset" onclick="resetStack()">Reset</button>
</div>

<div class="footer">@curiousEd.ai</div>

<script>
let initialStack = [10, 20, 30, 40, 50];
let stack = [...initialStack];

function updateStack() {
    let stackBox = document.getElementById("stackBox");
    stackBox.innerHTML = "";

    for (let i = stack.length - 1; i >= 0; i--) {
        let block = document.createElement("div");
        block.className = "stack-block";
        block.innerText = stack[i];
        stackBox.appendChild(block);
    }
}

function popValue() {
    let codeBox = document.getElementById("codeBox");
    let outputBox = document.getElementById("outputBox");

    if (stack.length === 0) {
        codeBox.innerHTML += "<br>Stack Underflow!";
        outputBox.innerHTML = "Stack Underflow!";
        return;
    }

    let item = stack.pop();
    updateStack();

    codeBox.innerHTML += "<br>item = stack.pop()";
    codeBox.innerHTML += "<br>print(item)";

    outputBox.innerHTML = item;
}

function resetStack() {
    stack = [...initialStack];
    document.getElementById("codeBox").innerHTML = "stack = [10, 20, 30, 40, 50]";
    document.getElementById("outputBox").innerHTML = "Output will appear here";
    updateStack();
}

updateStack();
</script>

</body>
</html>
